name: template_a
description: "A new Flutter project."
publish_to: 'none'

resolution:
  workspace

version: 1.0.0+1

environment:
  sdk: ^3.10.0-290.4.beta

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  theme:
    path: ../../packages/theme
  common_components:
    path: ../../packages/common_components
  preference_manager:
    path: ../../packages/preference_manager
  routing:
    path: ../../packages/routing
  locale:
    path: ../../packages/locale
  network:
    path: ../../packages/network
  url_launcher: ^6.3.2
  geolocator: ^14.0.2
  latlong2: ^0.9.1
  flutter_map: ^8.2.2
  flutter_svg: ^2.2.4
  shimmer: ^3.0.0
  connectivity_plus: ^7.0.0
  flutter_html: ^3.0.0
  upgrader: ^11.4.0
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: assets/icon/icon.png
  ios: true
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/env/.env
    - assets/svg/
    - assets/config/
    - assets/icons/
    - assets/images/
