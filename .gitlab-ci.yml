stages:
  - validate

metadata-validate:
  stage: validate
  image: ruby:3-alpine
  script:
    - ruby -ryaml -e "YAML.unsafe_load_file('publiccode.yml'); puts 'publiccode.yml parses OK'"
    - test -f LICENSE && echo "LICENSE present"
    - test -f SECURITY.md && echo "SECURITY.md present"
    - test -f README.md && echo "README.md present"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
